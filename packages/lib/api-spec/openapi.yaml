openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: collections
    description: Product collections / categories
  - name: products
    description: Product management

paths:
  # ── Health ─────────────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Collections ────────────────────────────────────────────────────────────
  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List all collections
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"
    post:
      operationId: createCollection
      tags: [collections]
      summary: Create a new collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionInput"
      responses:
        "201":
          description: Created collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collections/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getCollection
      tags: [collections]
      summary: Get a single collection
      responses:
        "200":
          description: Collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCollection
      tags: [collections]
      summary: Update a collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollectionInput"
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCollection
      tags: [collections]
      summary: Delete a collection
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collections/{id}/products:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getCollectionProducts
      tags: [collections]
      summary: Get all products in a collection
      responses:
        "200":
          description: Products in collection
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: addProductToCollection
      tags: [collections]
      summary: Add product(s) to a collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProductsInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /collections/{id}/products/{productId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: productId
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: removeProductFromCollection
      tags: [collections]
      summary: Remove a product from a collection
      responses:
        "204":
          description: Removed

  # ── Products ───────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: collectionId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: activeOnly
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Bulk import products from CSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProductsInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}/collections:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getProductCollections
      tags: [products]
      summary: Get collections a product belongs to
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"

components:
  schemas:
    # ── Health ────────────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Shared ────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    # ── Collections ───────────────────────────────────────────────────────────
    Collection:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        sortOrder:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, slug, sortOrder, active, createdAt, updatedAt]

    CreateCollectionInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        sortOrder:
          type: integer
          default: 0
        active:
          type: boolean
          default: true
      required: [name, slug]

    UpdateCollectionInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        sortOrder:
          type: integer
        active:
          type: boolean

    AddProductsInput:
      type: object
      properties:
        productIds:
          type: array
          items:
            type: string
      required: [productIds]

    # ── Products ──────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: integer
        compareAtPrice:
          type: integer
          nullable: true
        stock:
          type: integer
        category:
          type: string
        image:
          type: string
        images:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        active:
          type: boolean
        variants:
          nullable: true
        metaTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        collectionIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, price, stock, category, image, images, tags, active, collectionIds, createdAt, updatedAt]

    ProductsListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [products, total, limit, offset]

    CreateProductInput:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: integer
        compareAtPrice:
          type: integer
          nullable: true
        stock:
          type: integer
          default: 0
        category:
          type: string
        image:
          type: string
        images:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        active:
          type: boolean
          default: true
        variants:
          nullable: true
        metaTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        collectionIds:
          type: array
          items:
            type: integer
      required: [name, price, category, image]

    UpdateProductInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: integer
        compareAtPrice:
          type: integer
          nullable: true
        stock:
          type: integer
        category:
          type: string
        image:
          type: string
        images:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        active:
          type: boolean
        variants:
          nullable: true
        metaTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        collectionIds:
          type: array
          items:
            type: integer

    ImportProductsInput:
      type: object
      properties:
        csv:
          type: string
          description: Raw CSV text (Shopify format or Zorvik format)
        collectionId:
          type: integer
          nullable: true
          description: Optionally assign all imported products to this collection
        replaceExisting:
          type: boolean
          default: false
      required: [csv]

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        updated:
          type: integer
        errors:
          type: array
          items:
            type: string
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required: [imported, updated, errors, products]
